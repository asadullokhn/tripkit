server {
    listen       80;
    server_name  _;
    root         /usr/share/nginx/html;
    index        index.html;

    gzip              on;
    gzip_vary         on;
    gzip_min_length   256;
    gzip_types        text/css application/javascript application/json image/svg+xml;

    # bill-splitter shared-state API → Go backend container
    location /api/ {
        proxy_pass http://api:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 180s;   # AI itinerary generation can take >30s for long trips
    }

    # PWA manifest needs the correct MIME type regardless of the base image's mime.types
    location = /manifest.webmanifest {
        types { application/manifest+json webmanifest; }
        default_type application/manifest+json;
        add_header Cache-Control "no-cache";
    }

    # service worker must always revalidate so SW updates ship promptly
    location = /sw.js {
        add_header Cache-Control "no-cache";
        try_files $uri =404;
    }

    # shared /trip/ link: route social crawlers to the OG endpoint for a rich
    # link preview; humans (no UA match) fall through to the static SPA below.
    # $is_args$args preserves the ?t=<id> query string on the proxied request.
    location /trip/ {
        # forward the public Host so the OG handler builds absolute og:url/og:image
        # against the real domain (not the internal api:8080 upstream)
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        if ($http_user_agent ~* "(facebookexternalhit|Twitterbot|WhatsApp|TelegramBot|Slackbot|LinkedInBot|Discordbot|Pinterest|redditbot|Googlebot|bingbot|Applebot|vkShare|Embedly|SkypeUriPreview|Bitrix|nuzzel|Qwantify)") {
            proxy_pass http://api:8080/api/og$is_args$args;
        }
        try_files $uri $uri/ =404;
        add_header Cache-Control "no-cache";
    }

    # landing (/), /split/ (splitter) — revalidate everything;
    # ?v= query strings on assets bust any stale edge copy.
    location / {
        try_files $uri $uri/ =404;
        add_header Cache-Control "no-cache";
    }
}
