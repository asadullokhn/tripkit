<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0b1411" />
  <title>Tripkit</title>
  <meta name="description" content="Tripkit — plan trips, split costs, and see who pays whom." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,600;12..96,700;12..96,800&family=Hanken+Grotesque:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
  <link rel="apple-touch-icon" href="/apple-touch-icon-180.png" />
  <link rel="manifest" href="/manifest.webmanifest" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Tripkit" />
  <link rel="stylesheet" href="/shared/tokens.css?v=1" />
  <script src="/shared/i18n.js?v=1"></script>
  <style>
    * { box-sizing:border-box; }
    body {
      margin:0; min-height:100dvh; color:var(--ink); font-family:var(--font-body);
      background:
        radial-gradient(120% 80% at 85% -10%, rgba(255,111,89,.16), transparent 55%),
        radial-gradient(110% 70% at 0% 0%, rgba(52,223,192,.12), transparent 50%),
        var(--base);
      background-attachment:fixed;
      display:grid; place-items:start center;
      padding:max(var(--space-7), var(--safe-t)) max(var(--space-4), var(--safe-r)) max(40px, var(--safe-b)) max(var(--space-4), var(--safe-l));
      -webkit-tap-highlight-color:transparent; -webkit-font-smoothing:antialiased;
    }
    .wrap { width:min(100%,760px); }

    /* ---- header ---- */
    .top { display:flex; align-items:flex-start; justify-content:space-between; gap:16px;
      animation:rise var(--dur-slow) var(--ease-entrance) both; }
    .brandrow { display:flex; align-items:center; gap:14px; }
    .brandrow img { width:54px; height:54px; flex:none; filter:drop-shadow(0 6px 16px rgba(0,0,0,.45)); }
    h1 { font-family:var(--font-display); font-weight:800; font-size:clamp(2.2rem,8vw,3.6rem); line-height:1; margin:0 0 6px;
      background:linear-gradient(95deg,var(--gold),var(--coral)); -webkit-background-clip:text; background-clip:text; color:transparent; }
    .sub { color:var(--muted); margin:0; font-size:1.02rem; max-width:46ch; }
    .actions { display:flex; align-items:center; gap:8px; flex:none; }

    /* ---- buttons ---- */
    .ghost { appearance:none; background:transparent; border:1px solid var(--line); color:var(--muted); cursor:pointer;
      font-family:var(--font-body); font-weight:600; font-size:.82rem; min-height:var(--tap-min); padding:0 16px;
      border-radius:var(--radius-pill); transition:color var(--dur),border-color var(--dur); white-space:nowrap; }
    .ghost:hover { color:var(--ink); border-color:var(--accent); }
    .ghost:focus-visible { outline:2px solid var(--accent); outline-offset:2px; }
    .ghost:active { transform:translateY(1px); background:var(--surface-2); }
    .solid { appearance:none; border:0; cursor:pointer; font-family:var(--font-body); font-weight:700; font-size:.92rem; width:100%;
      min-height:var(--tap-min); padding:0 16px; border-radius:var(--radius-pill); color:var(--accent-ink);
      background:linear-gradient(95deg,var(--gold),var(--sun)); transition:transform var(--dur-fast),filter var(--dur-fast); }
    .solid:focus-visible { outline:2px solid var(--ink); outline-offset:2px; }
    .solid:active { transform:translateY(1px); filter:brightness(.94); }
    .solid:disabled { opacity:.55; cursor:default; }

    /* ---- trips section ---- */
    .section-label { font-family:var(--font-mono); font-size:.72rem; letter-spacing:.12em; text-transform:uppercase; color:var(--faint);
      margin:30px 2px 12px; animation:rise var(--dur-slow) var(--ease-entrance) .06s both; }
    .cards { display:grid; gap:14px; grid-template-columns:1fr 1fr; animation:rise var(--dur-slow) var(--ease-entrance) .12s both; }
    @media (max-width:560px){ .cards{ grid-template-columns:1fr; } }

    .card { position:relative; display:flex; flex-direction:column; min-height:140px; padding:20px;
      border-radius:var(--radius-lg); background:linear-gradient(180deg,var(--surface-1),var(--base));
      border:1px solid var(--line); box-shadow:var(--shadow-2);
      transition:transform var(--dur) var(--ease-standard), border-color var(--dur); }
    .card:hover, .card:focus-within { transform:translateY(-3px); border-color:var(--accent); }
    .card__main:active { opacity:.85; }
    .card__head { display:flex; align-items:flex-start; gap:10px; }
    .card__title { flex:1; min-width:0; font-family:var(--font-display); font-weight:700; font-size:1.26rem; margin:0 0 6px; }
    .card__main { text-decoration:none; color:inherit; }
    .card__main:focus-visible { outline:2px solid var(--accent); outline-offset:3px; border-radius:4px; }
    .card__main::after { content:""; position:absolute; inset:0; z-index:1; border-radius:inherit; } /* stretched → bills */
    .card__desc { color:var(--muted); font-size:.85rem; margin:0; position:relative; }
    .card__row { display:flex; gap:8px; margin-top:auto; padding-top:16px; position:relative; z-index:2; }
    .pill { display:inline-flex; align-items:center; gap:6px; min-height:var(--tap-min); padding:0 14px;
      font-family:var(--font-mono); font-size:.76rem; text-decoration:none; border-radius:var(--radius-pill);
      border:1px solid var(--line); color:var(--muted); background:rgba(0,0,0,.22);
      transition:color var(--dur),border-color var(--dur); }
    .pill:hover { color:var(--ink); border-color:var(--accent); }
    .pill:focus-visible { outline:2px solid var(--accent); outline-offset:2px; }
    .pill:active { background:var(--surface-3); }
    .pill--bills { color:var(--ink); border-color:var(--line-strong); }
    .pill--itin { color:var(--accent); border-color:var(--line-strong); } /* the share/recruit path */

    .card__admin { flex:none; display:flex; gap:8px; position:relative; z-index:2; }
    .icon-btn { appearance:none; background:rgba(0,0,0,.3); border:1px solid var(--line); color:var(--muted); cursor:pointer;
      width:var(--tap-min); height:var(--tap-min); border-radius:var(--radius-md); font-size:.95rem; line-height:1;
      display:grid; place-items:center; transition:color var(--dur),border-color var(--dur),background var(--dur); }
    .icon-btn:hover { color:var(--ink); border-color:var(--accent); }
    .icon-btn:focus-visible { outline:2px solid var(--accent); outline-offset:2px; }
    .icon-btn:active { background:var(--surface-3); transform:translateY(1px); }
    .icon-btn--del { color:var(--danger); border-color:color-mix(in srgb, var(--danger) 40%, var(--line)); } /* persistently distinct, not hover-only */
    .icon-btn--del:hover { color:var(--danger); border-color:var(--danger); background:color-mix(in srgb, var(--danger) 14%, transparent); }

    .card--new { display:grid; place-items:center; text-align:center; border-style:dashed; color:var(--muted); cursor:pointer;
      min-height:140px; width:100%; font-family:var(--font-body); background:transparent; }
    .card--new:hover { color:var(--ink); border-color:var(--accent); }
    .card--new:focus-visible { outline:2px solid var(--accent); outline-offset:2px; }
    .card--new:active { background:var(--surface-1); }
    .card--new .plus { font-size:1.6rem; line-height:1; }
    .card--new .lbl { font-size:1.02rem; margin-top:4px; }

    .errstate { grid-column:1 / -1; display:grid; justify-items:start; gap:0; }
    .errstate .ghost { width:auto; }
    .foot { margin-top:32px; font-family:var(--font-mono); font-size:.78rem; color:var(--faint); }
    .hint { color:var(--muted); font-size:1rem; }
    #langHost :is(button,a,select,[role="button"]):focus-visible { outline:2px solid var(--accent); outline-offset:2px; border-radius:var(--radius-md); }
    #langHost :is(button,a,select,[role="button"]) { -webkit-tap-highlight-color:transparent; }

    /* loading skeleton (unknown duration → indeterminate shimmer + text) */
    .skeleton { display:grid; gap:14px; grid-template-columns:1fr 1fr; }
    @media (max-width:560px){ .skeleton{ grid-template-columns:1fr; } }
    .sk-card { min-height:140px; border-radius:var(--radius-lg); border:1px solid var(--line);
      background:linear-gradient(100deg, var(--surface-1) 30%, var(--surface-2) 50%, var(--surface-1) 70%);
      background-size:200% 100%; animation:shimmer 1.2s linear infinite; }
    @keyframes shimmer { from{ background-position:200% 0; } to{ background-position:-200% 0; } }

    /* ---- lock ---- */
    .lock { position:fixed; inset:0; z-index:50; display:grid; place-items:center;
      padding:max(24px, var(--safe-t)) 24px max(24px, var(--safe-b));
      background:radial-gradient(120% 80% at 85% -10%, rgba(255,111,89,.20), transparent 55%), var(--base); }
    .lock[hidden]{ display:none; }
    .lock form { display:grid; gap:14px; justify-items:center; width:min(92vw,330px); padding:30px 24px;
      border:1px solid var(--line); border-radius:var(--radius-lg); background:var(--surface-2); box-shadow:var(--shadow-2); }
    .lock img { width:42px; height:42px; }
    .lock h2 { font-family:var(--font-display); margin:0; color:var(--ink); }
    .lock__hint { color:var(--faint); font-size:.78rem; margin:-6px 0 2px; text-align:center; }
    .lock input { width:100%; text-align:center; font-family:var(--font-mono); font-size:1.6rem; letter-spacing:.4em; color:var(--ink);
      background:var(--base); border:1.5px solid var(--line); border-radius:var(--radius-md); padding:13px 10px; }
    .lock input:focus-visible { outline:none; border-color:var(--accent); box-shadow:0 0 0 3px color-mix(in srgb, var(--accent) 30%, transparent); }
    .lock form.shake { animation:shake .4s; }

    .err { color:var(--danger); font-size:.8rem; min-height:1em; margin:0; }

    /* ---- dialogs ---- */
    dialog.dlg { border:1px solid var(--line); background:var(--surface-2); color:var(--ink); border-radius:var(--radius-lg);
      padding:0; width:min(92vw,360px); box-shadow:var(--shadow-2); }
    dialog.dlg::backdrop { background:rgba(2,8,9,.66); backdrop-filter:blur(4px); }
    dialog.dlg:focus, dialog.dlg:focus-visible { outline:none; }   /* kill the default (blue) focus ring on showModal */
    .dlg__form { padding:22px; display:grid; gap:14px; }
    .dlg h3 { font-family:var(--font-display); font-size:1.18rem; margin:0; }
    .dlg label { display:grid; gap:5px; font-family:var(--font-mono); font-size:.68rem; letter-spacing:.06em; text-transform:uppercase; color:var(--muted); }
    .dlg input, .dlg select { font-family:var(--font-body); font-size:.95rem; color:var(--ink); background:var(--base);
      border:1px solid var(--line); border-radius:var(--radius-sm); padding:11px 12px; min-height:var(--tap-min); }
    .dlg input:focus-visible, .dlg select:focus-visible { outline:none; border-color:var(--accent); box-shadow:0 0 0 3px color-mix(in srgb, var(--accent) 30%, transparent); }
    .dlg input.invalid, .dlg select.invalid { border-color:var(--danger); }
    .dlg__body { font-size:1rem; color:var(--muted); line-height:1.5; margin:0; }
    .dlg__body b { color:var(--ink); }
    .dlg__actions { display:flex; justify-content:flex-end; gap:10px; margin-top:2px; }
    .dlg .err { min-height:0; }
    .dlg .danger { background:linear-gradient(95deg,#ff8a7a,var(--danger)); color:var(--danger-ink); }

    @keyframes rise { from{ opacity:0; transform:translateY(10px); } to{ opacity:1; transform:none; } }
    @keyframes shake { 0%,100%{transform:translateX(0)} 20%,60%{transform:translateX(-7px)} 40%,80%{transform:translateX(7px)} }
    @media (prefers-reduced-motion: reduce) { *, .top, .section-label, .cards, .sk-card { animation:none !important; transition:none !important; } }
  </style>
</head>
<body>
  <div class="lock" id="lock" hidden>
    <form id="lockForm" role="dialog" aria-modal="true" aria-labelledby="lockTitle">
      <img src="/favicon.svg" alt="" />
      <h2 id="lockTitle" data-i18n="landing.lockTitle">Enter passcode</h2>
      <p class="lock__hint" data-i18n="landing.lockHint">Ask the trip organiser for the code.</p>
      <input id="lockInput" type="password" inputmode="numeric" pattern="[0-9]*" maxlength="32" autocomplete="off" placeholder="••••" data-i18n-al="landing.lockInputAria" aria-label="Trip passcode" />
      <p class="err" id="lockErr" role="alert"></p>
      <button class="solid" type="submit" data-i18n="landing.unlock">Unlock</button>
    </form>
  </div>

  <main class="wrap">
    <div class="top">
      <div>
        <div class="brandrow"><img src="/favicon.svg" alt="" /><h1>Tripkit</h1></div>
        <p class="sub" data-i18n="landing.tagline">Plan trips, split the costs, and see who pays whom.</p>
      </div>
      <div class="actions">
        <span id="langHost"></span>
        <button class="ghost" id="authBtn" hidden data-i18n="landing.login">Log in</button>
      </div>
    </div>

    <div class="section-label" data-i18n="landing.tripsLabel">Trips</div>
    <div class="cards" id="trips" aria-busy="true">
      <p class="hint" id="tripsHint" role="status" aria-live="polite" data-i18n="common.loading">Loading…</p>
      <div class="skeleton" id="tripsSkeleton" aria-hidden="true"><div class="sk-card"></div><div class="sk-card"></div></div>
    </div>

    <p class="foot" id="foot"></p>
  </main>

  <!-- login dialog -->
  <dialog id="loginDlg" class="dlg" aria-labelledby="loginDlgTitle">
    <form class="dlg__form" id="loginForm">
      <h3 id="loginDlgTitle" data-i18n="landing.loginDlgTitle">Log in to edit</h3>
      <label><span data-i18n="landing.adminPassword">Admin password</span><input id="loginPw" type="password" autocomplete="current-password" /></label>
      <p class="err" id="loginErr" role="alert"></p>
      <div class="dlg__actions">
        <button type="button" class="ghost" id="loginCancel" data-i18n="common.cancel">Cancel</button>
        <button type="submit" class="solid" style="width:auto" id="loginSubmit" data-i18n="landing.login">Log in</button>
      </div>
    </form>
  </dialog>

  <!-- trip create / rename dialog -->
  <dialog id="tripDlg" class="dlg" aria-labelledby="tripDlgTitle">
    <form class="dlg__form" id="tripForm">
      <h3 id="tripDlgTitle" data-i18n="landing.tripDlgNew">New trip</h3>
      <label><span data-i18n="landing.name">Name</span><input id="tripName" type="text" maxlength="60" /></label>
      <label id="tripCurWrap"><span data-i18n="landing.baseCurrency">Base currency</span>
        <select id="tripCur">
          <option>IDR</option><option>USD</option><option>EUR</option><option>GBP</option><option>THB</option>
          <option>SGD</option><option>MYR</option><option>AUD</option><option>JPY</option><option>INR</option>
          <option>VND</option><option>PHP</option><option>AED</option><option>TRY</option><option>UZS</option>
        </select>
      </label>
      <p class="err" id="tripErr" role="alert"></p>
      <div class="dlg__actions">
        <button type="button" class="ghost" id="tripCancel" data-i18n="common.cancel">Cancel</button>
        <button type="submit" class="solid" style="width:auto" id="tripSave" data-i18n="landing.create">Create</button>
      </div>
    </form>
  </dialog>

  <!-- confirm dialog -->
  <dialog id="confirmDlg" class="dlg" aria-labelledby="confirmDlgTitle">
    <div class="dlg__form">
      <h3 id="confirmDlgTitle" data-i18n="landing.confirmTitle">Are you sure?</h3>
      <p class="dlg__body" id="confirmDlgBody"></p>
      <div class="dlg__actions">
        <button type="button" class="ghost" id="confirmDlgCancel" data-i18n="common.cancel">Cancel</button>
        <button type="button" class="solid" style="width:auto" id="confirmDlgOk" data-i18n="common.confirm">Confirm</button>
      </div>
    </div>
  </dialog>

  <script>
  (() => {
    const API = "/api", PASS_KEY = "balitrip-pass";
    let pass = localStorage.getItem(PASS_KEY) || "";
    let admin = false, loginEnabled = false, lastFocus = null;
    const $ = (s) => document.querySelector(s);
    const esc = (s) => String(s == null ? "" : s).replace(/[&<>"']/g, (c) => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c]));

    async function api(path, opts = {}) {
      const headers = {}; if (pass) headers["X-Passcode"] = pass;
      let body = opts.body; if (body) { headers["Content-Type"] = "application/json"; body = JSON.stringify(body); }
      const ctrl = new AbortController(); const timer = setTimeout(() => ctrl.abort(), 30000);
      try {
        const res = await fetch(API + path, { method: opts.method || "GET", headers, body, credentials: "same-origin", signal: ctrl.signal });
        if (!res.ok) { const e = new Error("api " + res.status); e.code = res.status; throw e; }
        return res.status === 204 ? null : res.json();
      } finally { clearTimeout(timer); }
    }

    function openDlg(dlg, focusSel) { lastFocus = document.activeElement; dlg.showModal(); setTimeout(() => { const f = focusSel && dlg.querySelector(focusSel); if (f) f.focus(); }, 30); }
    function closeDlg(dlg) { dlg.close(); if (lastFocus && lastFocus.focus) { try { lastFocus.focus(); } catch (_) {} } lastFocus = null; }
    // tap-outside-to-dismiss (explicit Cancel + Esc already exist; click the backdrop closes too)
    function onBackdropClick(dlg, onDismiss) {
      dlg.addEventListener("click", (e) => {
        if (e.target !== dlg) return; // backdrop is the dialog element itself; inner form/content stops here
        const r = dlg.getBoundingClientRect();
        const inside = e.clientX >= r.left && e.clientX <= r.right && e.clientY >= r.top && e.clientY <= r.bottom;
        if (!inside) onDismiss();
      });
    }

    function lock(msg) { const el = $("#lock"); const was = !el.hidden; el.hidden = false; if (msg) { $("#lockErr").textContent = msg; if (was) { const f = el.querySelector("form"); f.classList.remove("shake"); void f.offsetWidth; f.classList.add("shake"); } } setTimeout(() => $("#lockInput").focus(), 60); }
    $("#lockForm").addEventListener("submit", (e) => { e.preventDefault(); const v = $("#lockInput").value.trim(); if (!v) return; pass = v; loadTrips(true); });

    // themed confirm
    const confirmDlg = $("#confirmDlg"); let confirmResolve = null;
    function confirmAsk({ title, body, okLabel = I18N.t("common.confirm", "Confirm"), danger = false }) {
      return new Promise((resolve) => {
        confirmResolve = resolve;
        $("#confirmDlgTitle").textContent = title; $("#confirmDlgBody").innerHTML = body || "";
        const ok = $("#confirmDlgOk"); ok.textContent = okLabel; ok.classList.toggle("danger", danger);
        openDlg(confirmDlg, danger ? "#confirmDlgCancel" : "#confirmDlgOk");
      });
    }
    function resolveConfirm(v) { if (confirmResolve) { confirmResolve(v); confirmResolve = null; } closeDlg(confirmDlg); }
    $("#confirmDlgOk").addEventListener("click", () => resolveConfirm(true));
    $("#confirmDlgCancel").addEventListener("click", () => resolveConfirm(false));
    confirmDlg.addEventListener("cancel", (e) => { e.preventDefault(); resolveConfirm(false); });
    onBackdropClick(confirmDlg, () => resolveConfirm(false));

    function tripUrl(base, id) { return base + "/?t=" + encodeURIComponent(id); }

    function renderTrips(trips) {
      const el = $("#trips"); el.removeAttribute("aria-busy"); el.innerHTML = "";
      if (!trips.length) el.innerHTML = `<p class="hint">${esc(admin ? I18N.t("landing.noTripsAdmin", "No trips yet — create one below.") : I18N.t("landing.noTrips", "No trips yet."))}</p>`;
      trips.forEach((t) => {
        const card = document.createElement("article"); card.className = "card";
        card.innerHTML = `
          <div class="card__head">
            <h3 class="card__title"><a class="card__main" href="${tripUrl("/split", t.id)}" aria-label="${esc(I18N.t("landing.openBillsAria", "Open {name} — bills", { name: t.name }))}">${esc(t.name)}</a></h3>
          </div>
          <p class="card__desc">${I18N.t("landing.cardStats", "{people} people · {receipts} receipts · {expenses} shared costs · {currency}", { people: t.people, receipts: t.receipts, expenses: t.expenses, currency: esc(t.baseCurrency) })}</p>
          <div class="card__row">
            <a class="pill pill--bills" href="${tripUrl("/split", t.id)}">💸 ${esc(I18N.t("landing.bills", "Bills"))}</a>
            <a class="pill pill--itin" href="${tripUrl("/trip", t.id)}">🗺 ${esc(I18N.t("landing.itinerary", "Itinerary"))}</a>
          </div>`;
        if (admin) {
          const ad = document.createElement("div"); ad.className = "card__admin";
          const rn = document.createElement("button"); rn.className = "icon-btn"; rn.type = "button"; rn.setAttribute("aria-label", I18N.t("landing.renameAria", "Rename {name}", { name: t.name })); rn.innerHTML = `<span aria-hidden="true">✎</span>`;
          rn.addEventListener("click", () => openTripDialog(t));
          const dl = document.createElement("button"); dl.className = "icon-btn icon-btn--del"; dl.type = "button"; dl.setAttribute("aria-label", I18N.t("landing.deleteAria", "Delete {name}", { name: t.name })); dl.innerHTML = `<span aria-hidden="true">✕</span>`;
          dl.addEventListener("click", async () => {
            const ok = await confirmAsk({ title: I18N.t("landing.deleteTripTitle", "Delete trip?"), danger: true, okLabel: I18N.t("common.delete", "Delete"), body: I18N.t("landing.deleteTripBody", "<b>{name}</b> and all its receipts, costs and people will be permanently removed.", { name: esc(t.name) }) });
            if (ok) { try { await api("/trips/" + t.id, { method: "DELETE" }); loadTrips(); } catch (_) {} }
          });
          ad.append(rn, dl); card.querySelector(".card__head").appendChild(ad);
        }
        el.appendChild(card);
      });
      if (admin) {
        const nw = document.createElement("button"); nw.className = "card card--new"; nw.type = "button"; nw.setAttribute("aria-label", I18N.t("landing.createNewAria", "Create a new trip"));
        nw.innerHTML = `<div><div class="plus" aria-hidden="true">＋</div><div class="lbl">${esc(I18N.t("landing.newTrip", "New trip"))}</div></div>`;
        nw.addEventListener("click", () => openTripDialog(null)); el.appendChild(nw);
      }
    }

    // trip create / rename dialog
    const tripDlg = $("#tripDlg"); let tripEditing = null;
    function openTripDialog(t) {
      tripEditing = t ? t.id : null;
      $("#tripDlgTitle").textContent = t ? I18N.t("landing.tripDlgRename", "Rename trip") : I18N.t("landing.tripDlgNew", "New trip");
      $("#tripName").value = t ? t.name : "";
      $("#tripCur").value = t ? t.baseCurrency : "IDR";
      $("#tripCurWrap").style.display = t ? "none" : "grid";  // currency fixed after creation
      $("#tripErr").textContent = "";
      const nm = $("#tripName"); nm.classList.remove("invalid"); nm.removeAttribute("aria-invalid");
      $("#tripSave").textContent = t ? I18N.t("common.save", "Save") : I18N.t("landing.create", "Create");
      openDlg(tripDlg, "#tripName");
    }
    $("#tripName").addEventListener("input", () => { const f = $("#tripName"); if (f.value.trim()) { f.classList.remove("invalid"); f.removeAttribute("aria-invalid"); $("#tripErr").textContent = ""; } });
    $("#tripCancel").addEventListener("click", () => closeDlg(tripDlg));
    tripDlg.addEventListener("cancel", (e) => { e.preventDefault(); closeDlg(tripDlg); });
    onBackdropClick(tripDlg, () => closeDlg(tripDlg));
    $("#tripForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const name = $("#tripName").value.trim();
      if (!name) { $("#tripErr").textContent = I18N.t("landing.nameRequired", "Name is required"); const f = $("#tripName"); f.classList.add("invalid"); f.setAttribute("aria-invalid", "true"); f.focus(); return; }
      const btn = $("#tripSave"); btn.disabled = true;
      try {
        if (tripEditing) { await api("/trips/" + tripEditing, { method: "PUT", body: { name } }); closeDlg(tripDlg); loadTrips(); }
        else { const d = await api("/trips", { method: "POST", body: { name, baseCurrency: $("#tripCur").value } }); location.href = tripUrl("/split", d.trip.id); }
      } catch (err) { $("#tripErr").textContent = (err.code === 401 || err.code === 403) ? I18N.t("landing.logInFirst", "Log in first.") : I18N.t("landing.couldntSave", "Couldn't save."); }
      finally { btn.disabled = false; }
    });

    // login dialog
    const loginDlg = $("#loginDlg");
    function applyAuth() {
      const b = $("#authBtn");
      if (admin) { b.hidden = false; b.textContent = I18N.t("landing.logout", "Log out"); }
      else if (loginEnabled) { b.hidden = false; b.textContent = I18N.t("landing.login", "Log in"); }
      else b.hidden = true;
    }
    $("#authBtn").addEventListener("click", async () => {
      if (admin) { try { await api("/logout", { method: "POST" }); } catch (_) {} admin = false; applyAuth(); loadTrips(); return; }
      $("#loginPw").value = ""; $("#loginErr").textContent = ""; openDlg(loginDlg, "#loginPw");
    });
    $("#loginCancel").addEventListener("click", () => closeDlg(loginDlg));
    loginDlg.addEventListener("cancel", (e) => { e.preventDefault(); closeDlg(loginDlg); });
    onBackdropClick(loginDlg, () => closeDlg(loginDlg));
    $("#loginForm").addEventListener("submit", async (e) => {
      e.preventDefault(); const btn = $("#loginSubmit"); btn.disabled = true; $("#loginErr").textContent = "";
      try { await api("/login", { method: "POST", body: { password: $("#loginPw").value } }); closeDlg(loginDlg); admin = true; applyAuth(); loadTrips(); }
      catch (err) { $("#loginErr").textContent = err.code === 429 ? I18N.t("landing.tooManyAttempts", "Too many attempts.") : I18N.t("landing.wrongPassword", "Wrong password."); const f = loginDlg.querySelector("form"); f.classList.remove("shake"); void f.offsetWidth; f.classList.add("shake"); $("#loginPw").select(); }
      finally { btn.disabled = false; }
    });

    async function loadTrips(fromLock) {
      try {
        const trips = await api("/trips");
        if (fromLock) { localStorage.setItem(PASS_KEY, pass); $("#lock").hidden = true; }
        renderTrips(trips);
      } catch (e) {
        const el = $("#trips"); el.removeAttribute("aria-busy");
        if (e.code === 401) { el.innerHTML = ""; lock(fromLock ? I18N.t("landing.wrongPasscode", "Wrong passcode") : ""); }
        else {
          el.innerHTML = `<div class="errstate" role="alert"><p class="hint" style="margin:0 0 12px">${esc(I18N.t("landing.couldntLoad", "Couldn't load trips."))}</p><button class="ghost" id="retry">${esc(I18N.t("common.retry", "Retry"))}</button></div>`;
          const r = $("#retry"); if (r) r.addEventListener("click", () => { el.setAttribute("aria-busy", "true"); el.innerHTML = `<p class="hint" role="status" aria-live="polite">${esc(I18N.t("common.loading", "Loading…"))}</p><div class="skeleton" aria-hidden="true"><div class="sk-card"></div><div class="sk-card"></div></div>`; loadTrips(); });
        }
      }
    }

    async function boot() {
      $("#foot").textContent = location.host;
      if (window.I18N) { I18N.mount($("#langHost")); }
      try { const me = await api("/me"); admin = !!me.admin; loginEnabled = !!me.loginEnabled; } catch (_) {}
      applyAuth();
      loadTrips();
    }
    window.addEventListener("i18n:change", () => { applyAuth(); loadTrips(); });
    boot();
  })();
  </script>

  <style>
    /* offline banner — dusk-themed, non-blocking, safe-area aware */
    .offline-banner { position:fixed; left:50%; transform:translateX(-50%) translateY(8px);
      bottom:max(16px, var(--safe-b)); z-index:1400; max-width:calc(100vw - 32px);
      display:flex; align-items:center; gap:8px; padding:10px 16px; border-radius:var(--radius-pill);
      background:#13201b; border:1px solid var(--line-strong, var(--line)); color:var(--ink);
      font-family:var(--font-body); font-size:.84rem; box-shadow:var(--shadow-2);
      opacity:0; pointer-events:none; transition:opacity var(--dur), transform var(--dur); }
    .offline-banner.in { opacity:1; transform:translateX(-50%) translateY(0); }
    @media (prefers-reduced-motion: reduce) { .offline-banner { transition:none; } }
  </style>
  <script>
  (() => {
    // ---- service worker registration (deploy-safe; never throws into the page) ----
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => navigator.serviceWorker.register("/sw.js").catch(() => {}));
      // When a new SW takes control after a deploy, reload ONCE so fresh content shows.
      navigator.serviceWorker.addEventListener("controllerchange", () => {
        if (sessionStorage.getItem("tk-sw-reloaded")) return;
        sessionStorage.setItem("tk-sw-reloaded", "1");
        location.reload();
      });
    }

    // ---- offline banner ----
    const I18N = window.I18N || { t: (k, d) => (d != null ? d : k) };
    let banner = null;
    function showOffline() {
      if (banner) return;
      banner = document.createElement("div");
      banner.className = "offline-banner"; banner.setAttribute("role", "status"); banner.setAttribute("aria-live", "polite");
      banner.textContent = I18N.t("common.offline", "📴 Offline — showing your saved plan");
      document.body.appendChild(banner);
      requestAnimationFrame(() => banner && banner.classList.add("in"));
    }
    function hideOffline() {
      if (!banner) return;
      const b = banner; banner = null; b.classList.remove("in");
      setTimeout(() => b.remove(), 300);
    }
    window.addEventListener("offline", showOffline);
    window.addEventListener("online", hideOffline);
    if (!navigator.onLine) showOffline();
  })();
  </script>
</body>
