<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0a1518" />
  <title>Tripkit</title>
  <meta name="description" content="Tripkit — plan trips, split costs, and see who pays whom." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,600;12..96,700;12..96,800&family=Hanken+Grotesque:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  <style>
    .brandrow { display:flex; align-items:center; gap:14px; }
    .brandrow img { width:54px; height:54px; flex:none; filter:drop-shadow(0 6px 16px rgba(0,0,0,.4)); }
    @media (max-width:560px){ .brandrow img { width:44px; height:44px; } }
    :root {
      --ink:#0a1518; --ink2:#0e1f23; --card:#122a2f; --card2:#16343a; --line:#1f4248;
      --text:#eaf4f1; --muted:#8aa6a3; --faint:#5f7d7c; --sun:#ffb454; --coral:#ff6f59; --teal:#2fd6c3; --gold:#ffd66b; --bad:#ff7a8a;
    }
    * { box-sizing:border-box; }
    body {
      margin:0; min-height:100dvh; color:var(--text); font-family:"Hanken Grotesque",system-ui,sans-serif;
      background:
        radial-gradient(120% 80% at 85% -10%, rgba(255,111,89,.18), transparent 55%),
        radial-gradient(110% 70% at 0% 0%, rgba(47,214,195,.13), transparent 50%),
        linear-gradient(180deg,var(--ink2),var(--ink) 60%);
      background-attachment:fixed; display:grid; place-items:start center; padding:28px max(16px, env(safe-area-inset-left)) 60px max(16px, env(safe-area-inset-right));
    }
    .wrap { width:min(100%,760px); }
    .top { display:flex; align-items:flex-start; justify-content:space-between; gap:16px; }
    .kicker { font-family:"DM Mono",monospace; font-size:.74rem; letter-spacing:.28em; text-transform:uppercase; color:var(--sun); }
    h1 { font-family:"Bricolage Grotesque",sans-serif; font-weight:800; font-size:clamp(2.2rem,8vw,3.6rem); line-height:1; margin:6px 0 4px;
      background:linear-gradient(95deg,var(--gold),var(--coral)); -webkit-background-clip:text; background-clip:text; color:transparent; }
    .sub { color:var(--muted); margin:0 0 26px; font-size:1.02rem; }
    .ghost { appearance:none; background:transparent; border:1px solid var(--line); color:var(--muted); cursor:pointer;
      font-family:"Hanken Grotesque",sans-serif; font-weight:600; font-size:.8rem; padding:9px 15px; border-radius:99px; transition:.15s; white-space:nowrap; }
    .ghost:hover { color:var(--text); border-color:var(--coral); }
    .section-label { font-family:"DM Mono",monospace; font-size:.7rem; letter-spacing:.12em; text-transform:uppercase; color:var(--faint); margin:26px 2px 12px; display:flex; align-items:center; gap:10px; }
    .cards { display:grid; gap:14px; grid-template-columns:1fr 1fr; }
    @media (max-width:560px){ .cards{ grid-template-columns:1fr; } }
    .card-wrap { position:relative; }
    .card { position:relative; display:block; text-decoration:none; color:inherit; padding:22px; border-radius:18px;
      background:linear-gradient(180deg,var(--card),var(--ink2)); border:1px solid var(--line);
      box-shadow:0 18px 50px -22px rgba(0,0,0,.75); transition:transform .12s ease, border-color .15s ease; }
    a.card:hover, a.card:focus-visible { transform:translateY(-3px); border-color:var(--c,var(--teal)); outline:none; }
    .card__icon { font-size:1.7rem; }
    .card__title { font-family:"Bricolage Grotesque",sans-serif; font-weight:700; font-size:1.28rem; margin:10px 0 4px; padding-right:64px; }
    .card__desc { color:var(--muted); font-size:.86rem; }
    .card__go { display:inline-block; margin-top:14px; font-family:"DM Mono",monospace; font-size:.76rem; color:var(--c,var(--teal)); }
    .card__admin { position:absolute; top:12px; right:12px; display:flex; gap:6px; z-index:2; }
    .card__itin { position:absolute; bottom:18px; right:18px; z-index:2; font-family:"DM Mono",monospace; font-size:.72rem;
      color:var(--teal); text-decoration:none; border:1px solid var(--line); border-radius:99px; padding:6px 11px; background:rgba(0,0,0,.25); transition:.15s; }
    .card__itin:hover { color:var(--text); border-color:var(--teal); }
    .icon-btn { appearance:none; background:rgba(0,0,0,.3); border:1px solid var(--line); color:var(--muted); cursor:pointer;
      width:36px; height:36px; border-radius:9px; font-size:.85rem; line-height:1; transition:.15s; }
    .icon-btn:hover { color:var(--text); border-color:var(--teal); }
    .icon-btn.del:hover { color:var(--bad); border-color:var(--bad); }
    .card--new { display:grid; place-items:center; text-align:center; border-style:dashed; color:var(--muted); cursor:pointer; min-height:120px; width:100%;
      font-family:"Hanken Grotesque",sans-serif; }
    .card--new:hover { color:var(--text); border-color:var(--teal); }
    .foot { margin-top:30px; font-family:"DM Mono",monospace; font-size:.7rem; color:var(--faint); }
    .hint { color:var(--faint); font-size:.86rem; font-style:italic; }
    /* lock */
    .lock { position:fixed; inset:0; z-index:50; display:grid; place-items:center; padding:24px;
      background:radial-gradient(120% 80% at 85% -10%, rgba(255,111,89,.22), transparent 55%), linear-gradient(180deg,var(--ink2),var(--ink) 60%); }
    .lock[hidden]{ display:none; }
    .lock form { display:grid; gap:14px; justify-items:center; width:min(92vw,320px); padding:30px 24px; border:1px solid var(--line);
      border-radius:20px; background:linear-gradient(180deg,var(--card2),var(--ink2)); box-shadow:0 18px 50px -22px rgba(0,0,0,.75); }
    .lock h2 { font-family:"Bricolage Grotesque",sans-serif; margin:0; background:linear-gradient(95deg,var(--gold),var(--coral)); -webkit-background-clip:text; background-clip:text; color:transparent; }
    .lock input { width:100%; text-align:center; font-family:"DM Mono",monospace; font-size:1.6rem; letter-spacing:.4em; color:var(--text);
      background:var(--ink); border:1.5px solid var(--line); border-radius:14px; padding:13px 10px; }
    .lock input:focus { outline:none; border-color:var(--teal); }
    .solid { appearance:none; border:0; cursor:pointer; font-family:"Hanken Grotesque",sans-serif; font-weight:700; font-size:.9rem; width:100%;
      padding:12px; border-radius:99px; color:#2a160a; background:linear-gradient(95deg,var(--gold),var(--sun)); }
    .err { color:var(--bad); font-size:.8rem; min-height:1em; margin:0; }
    .lock form.shake { animation:shake .4s; }
    @keyframes shake { 0%,100%{transform:translateX(0)} 20%,60%{transform:translateX(-7px)} 40%,80%{transform:translateX(7px)} }
    /* themed dialogs */
    dialog.dlg { border:1px solid var(--line); background:var(--card2); color:var(--text); border-radius:20px; padding:0; width:min(92vw,360px); box-shadow:0 18px 50px -22px rgba(0,0,0,.75); }
    dialog.dlg::backdrop { background:rgba(2,8,9,.66); }
    .dlg__form { padding:22px; display:grid; gap:14px; }
    .dlg h3 { font-family:"Bricolage Grotesque",sans-serif; font-size:1.18rem; margin:0; }
    .dlg label { display:grid; gap:5px; font-family:"DM Mono",monospace; font-size:.68rem; letter-spacing:.06em; text-transform:uppercase; color:var(--muted); }
    .dlg input, .dlg select { font-family:"Hanken Grotesque",sans-serif; font-size:.95rem; color:var(--text); background:var(--ink);
      border:1px solid var(--line); border-radius:10px; padding:11px 12px; }
    .dlg input:focus, .dlg select:focus { outline:none; border-color:var(--teal); }
    .dlg__body { font-size:.92rem; color:var(--muted); line-height:1.5; margin:0; }
    .dlg__body b { color:var(--text); }
    .dlg__actions { display:flex; justify-content:flex-end; gap:10px; margin-top:2px; }
    .dlg .err { min-height:0; }
    .dlg .danger { background:linear-gradient(95deg,#ff8a7a,var(--bad)); color:#2a0d10; }
    @media (prefers-reduced-motion: reduce) { * { animation:none !important; transition:none !important; } }
  </style>
</head>
<body>
  <div class="lock" id="lock" hidden>
    <form id="lockForm" role="dialog" aria-modal="true" aria-labelledby="lockTitle">
      <span class="kicker">Tripkit</span>
      <h2 id="lockTitle">Enter passcode</h2>
      <input id="lockInput" type="password" inputmode="numeric" pattern="[0-9]*" maxlength="32" autocomplete="off" placeholder="••••" aria-label="Passcode" />
      <p class="err" id="lockErr" role="alert"></p>
      <button class="solid" type="submit">Unlock</button>
    </form>
  </div>

  <main class="wrap">
    <div class="top">
      <div>
        <span class="kicker">Plan · Split · Settle</span>
        <div class="brandrow"><img src="/favicon.svg" alt="" /><h1>Tripkit</h1></div>
        <p class="sub">Plan trips, split the costs, and see who pays whom.</p>
      </div>
      <div class="actions">
        <button class="ghost" id="authBtn" hidden>Log in</button>
      </div>
    </div>

    <div class="section-label">Trips <button class="ghost" id="newTripBtn" hidden style="padding:5px 12px;font-size:.72rem">+ New trip</button></div>
    <div class="cards" id="trips"><p class="hint" id="tripsHint">Loading…</p></div>

    <p class="foot">Each trip has a bill splitter and a 🗺 itinerary · balitrip.teztun.uz</p>
  </main>

  <!-- themed login dialog -->
  <dialog id="loginDlg" class="dlg" aria-labelledby="loginDlgTitle">
    <form class="dlg__form" id="loginForm">
      <h3 id="loginDlgTitle">Log in to edit</h3>
      <label>Admin password<input id="loginPw" type="password" autocomplete="current-password" /></label>
      <p class="err" id="loginErr" role="alert"></p>
      <div class="dlg__actions">
        <button type="button" class="ghost" id="loginCancel">Cancel</button>
        <button type="submit" class="solid" style="width:auto" id="loginSubmit">Log in</button>
      </div>
    </form>
  </dialog>

  <!-- themed trip create/rename dialog -->
  <dialog id="tripDlg" class="dlg" aria-labelledby="tripDlgTitle">
    <form class="dlg__form" id="tripForm">
      <h3 id="tripDlgTitle">New trip</h3>
      <label>Name<input id="tripName" type="text" maxlength="60" /></label>
      <label id="tripCurWrap">Base currency
        <select id="tripCur">
          <option>IDR</option><option>USD</option><option>EUR</option><option>GBP</option><option>THB</option>
          <option>SGD</option><option>MYR</option><option>AUD</option><option>JPY</option><option>INR</option>
          <option>VND</option><option>PHP</option><option>AED</option><option>TRY</option><option>UZS</option>
        </select>
      </label>
      <p class="err" id="tripErr" role="alert"></p>
      <div class="dlg__actions">
        <button type="button" class="ghost" id="tripCancel">Cancel</button>
        <button type="submit" class="solid" style="width:auto" id="tripSave">Create</button>
      </div>
    </form>
  </dialog>

  <!-- themed confirm dialog -->
  <dialog id="confirmDlg" class="dlg" aria-labelledby="confirmDlgTitle">
    <div class="dlg__form">
      <h3 id="confirmDlgTitle">Are you sure?</h3>
      <p class="dlg__body" id="confirmDlgBody"></p>
      <div class="dlg__actions">
        <button type="button" class="ghost" id="confirmDlgCancel">Cancel</button>
        <button type="button" class="solid" style="width:auto" id="confirmDlgOk">Confirm</button>
      </div>
    </div>
  </dialog>

  <script>
  (() => {
    const API = "/api", PASS_KEY = "balitrip-pass";
    let pass = localStorage.getItem(PASS_KEY) || "";
    let admin = false, loginEnabled = false, lastFocus = null;
    const $ = (s) => document.querySelector(s);
    const esc = (s) => String(s == null ? "" : s).replace(/[&<>"']/g, (c) => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c]));

    async function api(path, opts = {}) {
      const headers = {}; if (pass) headers["X-Passcode"] = pass;
      let body = opts.body; if (body) { headers["Content-Type"] = "application/json"; body = JSON.stringify(body); }
      const res = await fetch(API + path, { method: opts.method || "GET", headers, body, credentials: "same-origin" });
      if (!res.ok) { const e = new Error("api " + res.status); e.code = res.status; throw e; }
      return res.status === 204 ? null : res.json();
    }

    function openDlg(dlg, focusSel) { lastFocus = document.activeElement; dlg.showModal(); setTimeout(() => { const f = focusSel && dlg.querySelector(focusSel); if (f) f.focus(); }, 30); }
    function closeDlg(dlg) { dlg.close(); if (lastFocus && lastFocus.focus) { try { lastFocus.focus(); } catch (_) {} } lastFocus = null; }

    function lock(msg) { const el = $("#lock"); const was = !el.hidden; el.hidden = false; if (msg) { $("#lockErr").textContent = msg; if (was) { const f = el.querySelector("form"); f.classList.remove("shake"); void f.offsetWidth; f.classList.add("shake"); } } setTimeout(() => $("#lockInput").focus(), 60); }
    $("#lockForm").addEventListener("submit", (e) => { e.preventDefault(); const v = $("#lockInput").value.trim(); if (!v) return; pass = v; loadTrips(true); });

    // themed confirm
    const confirmDlg = $("#confirmDlg"); let confirmResolve = null;
    function confirmAsk({ title, body, okLabel = "Confirm", danger = false }) {
      return new Promise((resolve) => {
        confirmResolve = resolve;
        $("#confirmDlgTitle").textContent = title; $("#confirmDlgBody").innerHTML = body || "";
        const ok = $("#confirmDlgOk"); ok.textContent = okLabel; ok.classList.toggle("danger", danger);
        openDlg(confirmDlg, danger ? "#confirmDlgCancel" : "#confirmDlgOk");
      });
    }
    function resolveConfirm(v) { if (confirmResolve) { confirmResolve(v); confirmResolve = null; } closeDlg(confirmDlg); }
    $("#confirmDlgOk").addEventListener("click", () => resolveConfirm(true));
    $("#confirmDlgCancel").addEventListener("click", () => resolveConfirm(false));
    confirmDlg.addEventListener("cancel", (e) => { e.preventDefault(); resolveConfirm(false); });

    function renderTrips(trips) {
      const el = $("#trips"); el.innerHTML = "";
      if (!trips.length) el.innerHTML = `<p class="hint">No trips yet${admin ? " — create one below." : "."}</p>`;
      trips.forEach((t) => {
        const wrap = document.createElement("div"); wrap.className = "card-wrap";
        const a = document.createElement("a"); a.className = "card"; a.href = "/split/?t=" + encodeURIComponent(t.id);
        a.style.setProperty("--c", "var(--coral)");
        a.innerHTML = `<div class="card__icon">🧾</div>
          <div class="card__title">${esc(t.name)}</div>
          <div class="card__desc">${t.people} people · ${t.receipts} receipts · ${t.expenses} shared costs · ${esc(t.baseCurrency)}</div>
          <span class="card__go">Open splitter →</span>`;
        wrap.appendChild(a);
        const itin = document.createElement("a"); itin.className = "card__itin";
        itin.href = "/trip/?t=" + encodeURIComponent(t.id);
        itin.textContent = "🗺 Itinerary";
        itin.setAttribute("aria-label", "Open itinerary for " + t.name);
        wrap.appendChild(itin);
        if (admin) {
          const ad = document.createElement("div"); ad.className = "card__admin";
          const rn = document.createElement("button"); rn.className = "icon-btn"; rn.type = "button"; rn.title = "Rename"; rn.setAttribute("aria-label", "Rename " + t.name); rn.innerHTML = `<span aria-hidden="true">✎</span>`;
          rn.addEventListener("click", () => openTripDialog(t));
          const dl = document.createElement("button"); dl.className = "icon-btn del"; dl.type = "button"; dl.title = "Delete"; dl.setAttribute("aria-label", "Delete " + t.name); dl.innerHTML = `<span aria-hidden="true">✕</span>`;
          dl.addEventListener("click", async () => {
            const ok = await confirmAsk({ title: "Delete trip?", danger: true, okLabel: "Delete", body: `<b>${esc(t.name)}</b> and all its receipts, costs and people will be permanently removed.` });
            if (ok) { try { await api("/trips/" + t.id, { method: "DELETE" }); loadTrips(); } catch (_) {} }
          });
          ad.append(rn, dl); wrap.appendChild(ad);
        }
        el.appendChild(wrap);
      });
      if (admin) {
        const nw = document.createElement("button"); nw.className = "card card--new"; nw.type = "button";
        nw.innerHTML = `<div><div class="card__icon">＋</div><div class="card__title" style="font-size:1.05rem;padding:0">New trip</div></div>`;
        nw.addEventListener("click", () => openTripDialog(null)); el.appendChild(nw);
      }
    }

    // trip create / rename dialog
    const tripDlg = $("#tripDlg"); let tripEditing = null;
    function openTripDialog(t) {
      tripEditing = t ? t.id : null;
      $("#tripDlgTitle").textContent = t ? "Rename trip" : "New trip";
      $("#tripName").value = t ? t.name : "";
      $("#tripCur").value = t ? t.baseCurrency : "IDR";
      $("#tripCurWrap").style.display = t ? "none" : "grid";  // currency fixed after creation
      $("#tripErr").textContent = "";
      $("#tripSave").textContent = t ? "Save" : "Create";
      openDlg(tripDlg, "#tripName");
    }
    $("#tripCancel").addEventListener("click", () => closeDlg(tripDlg));
    tripDlg.addEventListener("cancel", (e) => { e.preventDefault(); closeDlg(tripDlg); });
    $("#tripForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const name = $("#tripName").value.trim();
      if (!name) { $("#tripErr").textContent = "Name is required"; $("#tripName").focus(); return; }
      const btn = $("#tripSave"); btn.disabled = true;
      try {
        if (tripEditing) { await api("/trips/" + tripEditing, { method: "PUT", body: { name } }); closeDlg(tripDlg); loadTrips(); }
        else { const d = await api("/trips", { method: "POST", body: { name, baseCurrency: $("#tripCur").value } }); location.href = "/split/?t=" + d.trip.id; }
      } catch (err) { $("#tripErr").textContent = (err.code === 401 || err.code === 403) ? "Log in first." : "Couldn't save."; }
      finally { btn.disabled = false; }
    });
    $("#newTripBtn").addEventListener("click", () => openTripDialog(null));

    // login dialog
    const loginDlg = $("#loginDlg");
    function applyAuth() {
      $("#newTripBtn").hidden = !admin;
      const b = $("#authBtn");
      if (admin) { b.hidden = false; b.textContent = "Log out"; }
      else if (loginEnabled) { b.hidden = false; b.textContent = "Log in"; }
      else b.hidden = true;
    }
    $("#authBtn").addEventListener("click", async () => {
      if (admin) { try { await api("/logout", { method: "POST" }); } catch (_) {} admin = false; applyAuth(); loadTrips(); return; }
      $("#loginPw").value = ""; $("#loginErr").textContent = ""; openDlg(loginDlg, "#loginPw");
    });
    $("#loginCancel").addEventListener("click", () => closeDlg(loginDlg));
    loginDlg.addEventListener("cancel", (e) => { e.preventDefault(); closeDlg(loginDlg); });
    $("#loginForm").addEventListener("submit", async (e) => {
      e.preventDefault(); const btn = $("#loginSubmit"); btn.disabled = true; $("#loginErr").textContent = "";
      try { await api("/login", { method: "POST", body: { password: $("#loginPw").value } }); closeDlg(loginDlg); admin = true; applyAuth(); loadTrips(); }
      catch (err) { $("#loginErr").textContent = err.code === 429 ? "Too many attempts." : "Wrong password."; const f = loginDlg.querySelector("form"); f.classList.remove("shake"); void f.offsetWidth; f.classList.add("shake"); $("#loginPw").select(); }
      finally { btn.disabled = false; }
    });

    async function loadTrips(fromLock) {
      try {
        const trips = await api("/trips");
        if (fromLock) { localStorage.setItem(PASS_KEY, pass); $("#lock").hidden = true; }
        renderTrips(trips);
      } catch (e) {
        if (e.code === 401) { $("#tripsHint").textContent = ""; lock(fromLock ? "Wrong passcode" : ""); }
        else $("#trips").innerHTML = `<p class="hint">Couldn't load trips.</p>`;
      }
    }

    async function boot() {
      try { const me = await api("/me"); admin = !!me.admin; loginEnabled = !!me.loginEnabled; } catch (_) {}
      applyAuth();
      loadTrips();
    }
    boot();
  })();
  </script>
</body>
</html>
