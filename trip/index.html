<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0b1411" />
  <title>Bali Highlands Ride — 4-day route</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%230a120f'/%3E%3Cpath d='M9 22 L16 9 L18 17 L23 22' fill='none' stroke='%2325b9cc' stroke-width='2.4' stroke-linecap='round' stroke-linejoin='round'/%3E%3Ccircle cx='23' cy='22' r='2.4' fill='%23f0884a'/%3E%3C/svg%3E" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,600;12..96,700;12..96,800&family=Hanken+Grotesque:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="styles.css?v=20260616" />
</head>
<body>
  <div id="app">
    <div id="map" aria-hidden="true"></div>
    <div class="grain" aria-hidden="true"></div>
    <div class="map-scrim-top" aria-hidden="true"></div>

    <!-- Top overlay: trip identity + day tabs -->
    <header class="topbar">
      <div class="brand">
        <a class="home-link" href="/">← Bali Trip</a>
        <span class="brand-eyebrow" id="brand-eyebrow">Bali · 4-day ride</span>
        <h1 class="brand-title" id="brand-title">Bali Highlands Ride</h1>
      </div>
      <div class="trip-chip" id="trip-chip"></div>
      <nav class="tabs" id="tabs" role="tablist" aria-label="Trip days"></nav>
    </header>

    <!-- Locate me -->
    <button class="locate" id="locate" aria-label="Show my current location">
      <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
        <path d="M12 8a4 4 0 1 0 0 8 4 4 0 0 0 0-8Zm0-6v3m0 14v3m10-10h-3M5 12H2" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/>
        <circle cx="12" cy="12" r="2.4" fill="currentColor" stroke="none"/>
      </svg>
    </button>

    <!-- Recenter button (fit the day's route) -->
    <button class="recenter" id="recenter" aria-label="Fit the whole route in view">
      <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
        <path d="M4 9V5a1 1 0 0 1 1-1h4M15 4h4a1 1 0 0 1 1 1v4M20 15v4a1 1 0 0 1-1 1h-4M9 20H5a1 1 0 0 1-1-1v-4" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/>
      </svg>
    </button>

    <!-- Bottom sheet: itinerary -->
    <section class="sheet" id="sheet" data-state="peek" aria-label="Day itinerary">
      <button class="sheet-grab" id="sheet-grab" aria-label="Expand or collapse itinerary">
        <span class="grab-bar"></span>
      </button>
      <button class="sheet-hide" id="sheet-hide" aria-label="Hide itinerary to see the full map">
        <svg viewBox="0 0 24 24" width="16" height="16" aria-hidden="true"><path d="m6 9 6 6 6-6" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <div class="sheet-scroll" id="sheet-scroll">
        <div class="sheet-inner" id="sheet-inner"><!-- rendered by app.js --></div>
      </div>
    </section>
  </div>

  <script src="routes.js?v=20260616"></script>
  <script src="app.js?v=20260616"></script>
</body>
</html>
