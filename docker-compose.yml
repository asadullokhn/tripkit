# App is "Tripkit". The compose project name and data volume are intentionally
# kept as "balitrip-expenses" / "balitrip-data" so the existing live data volume
# (balitrip-expenses_balitrip-data) is reused — renaming stateful infra would
# orphan the data. User-facing branding and image names are Tripkit.
name: balitrip-expenses

services:
  api:
    build: ./api
    image: tripkit-api:latest
    container_name: balitrip-expenses-api
    environment:
      - DATA_DIR=/data
      - PASSCODE=${PASSCODE:-changeme}
      - ADMIN_PASSWORD_HASH=${ADMIN_PASSWORD_HASH:-}
      - SESSION_SECRET=${SESSION_SECRET:-}
      - SEED_FILE=${SEED_FILE:-/seed/demo.json}
      - OCR_API_BASE=${OCR_API_BASE:-}
      - OCR_API_KEY=${OCR_API_KEY:-}
      - OCR_MODEL=${OCR_MODEL:-}
      - DEEPSEEK_API_BASE=${DEEPSEEK_API_BASE:-https://api.deepseek.com}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - DEEPSEEK_MODEL=${DEEPSEEK_MODEL:-deepseek-chat}
    volumes:
      - balitrip-data:/data
    restart: unless-stopped

  app:
    build: .
    image: tripkit-site:latest
    container_name: balitrip-expenses-app
    depends_on:
      - api
    restart: unless-stopped

  tunnel:
    image: asadullokhn/teztun:latest
    container_name: balitrip-tunnel
    command: ["tcp", "app:80", "--subdomain", "balitrip"]
    environment:
      - TEZTUN_TOKEN=${TEZTUN_TOKEN}
      - TEZTUN_NO_UPDATE=1
    depends_on:
      - app
    restart: unless-stopped

volumes:
  balitrip-data:
